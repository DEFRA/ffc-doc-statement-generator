environment: development
environmentCode:
name: ffc-doc-statement-generator
namespace: ffc-doc
workstream: ffc-doc
image: ffc-doc-statement-generator

labels: {}

appInsights:
  connectionString:

containerConfigMap:
  name: ffc-doc-statement-generator-config-map

containerSecret:
  name: ffc-doc-statement-generator-container-secret
  type: Opaque

deployment:
  minReplicas: 1
  maxReplicas: 4
  cpuThreshold: 80
  memoryThreshold: 80

container:
  requestMemory: 150Mi
  requestCpu: 120m
  limitMemory: 150Mi
  limitCpu: 120m
  messageQueueHost: namespace.servicebus.windows.net
  statementTopicAddress: ffc-doc-statements
  statementSubscriptionAddress: ffc-doc-statement-generator
  publishTopicAddress: ffc-doc-statement-publish
  crmTopicAddress: ffc-doc-statement-crm
  azureStorageAccountName: ffcdoc
  azureStorageConnectionString: dummy
  azureStorageUseConnectionString: false
  azureStorageCreateContainers: false
  storageContainer: statements
  storageFolder: outbound
  statementReceiverApiVersion: v1
  statementReceiverEndpoint: https://ffc-doc-statement-receiver
  showSfi23PaymentPeriod: false
  emailAddress: dummy
  apiKey: dummy
  emailTemplateKey: dummy
  sfi23QuarterlyStatementEnabled: false
  delinkedPaymentStatementEnabled: false
  sendCrmMessageEnabled: false
  publishingFrequency: 60000
  alertTopicAddress: ffc-doc-alerting
  pollWindowStart: "00:00"
  pollWindowEnd: "23:59"
  pollWindowDays: "Sun,Mon,Tue,Wed,Thu,Fri,Sat"
  pollWindowEnabled: true

ingress:
  server: azure.defra.cloud

postgresService:
  postgresDb: ffc_doc_statement_generator
  postgresqlHost: ffc-doc-statement-generator-postgres
  postgresPort: 5432
  postgresSchema: public
  postgresUser: postgres

workloadIdentity: true

azureIdentity:
  clientID: not-a-real-clientID
  resourceID: not-a-real-resourceID

secretProviderClass:
  azure:
    keyvaultName: SNDFFCINFKV2001
    objects: # reading the secret from Azure Key Vault
      - objectName: appInsights-connectionString # secret name in Azure Key Vault
        objectType: secret

  secretObjects: # creating a Kubernetes secret from the Azure Key Vault secrets
    - secretName: ffc-doc-statement-generator
      type: Opaque
      data:
        - objectName: appInsights-connectionString # secret name in Azure Key Vault
          key: APPLICATIONINSIGHTS_CONNECTION_STRING # the secret key in the Kubernetes secret and use in the application
