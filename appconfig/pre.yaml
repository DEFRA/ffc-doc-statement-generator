---
environment: production
environmentCode: pre
container:
  messageQueueHost: PREFFCINFSB1001.servicebus.windows.net
  azureStorageAccountName: preffcdocst1001
  redisHostname: PREFFCINFRD1001.redis.cache.windows.net
  showSfi23PaymentPeriod: false
  sfi23QuarterlyStatementEnabled: false
  delinkedPaymentStatementEnabled: true
  sendCrmMessageEnabled: false
  publishingFrequency: 3600000
  pollWindowStart: "08:00"
  pollWindowEnd: "18:00"
  pollWindowDays: "Mon,Tue,Wed,Thu,Fri"
  pollWindowEnabled: true
secretProviderClass:
  azure:
    keyvaultName: PREFFCINFKV1001
    objects:
      - objectName: pre-ffcahwr-appinsights-connectionString
        objectType: secret

  secretObjects:
    - secretName: ffc-doc-statement-generator
      type: Opaque
      data:
        - objectName: pre-ffcahwr-appinsights-connectionString
          key: APPLICATIONINSIGHTS_CONNECTION_STRING
